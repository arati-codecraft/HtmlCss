<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Application Form</h1>

    <form>
        <label for="First Name">First Name:</label>
        <input type="text" placeholder=" ">
         &nbsp;
        <label for="Last Name">Last Name:</label>
        <input type="text" placeholder=" ">

        <br><br>
        <label for="Date">Date of birth:</label>
        <input type="date" name="date">
        &nbsp;
        <label for="Age">Age:</label>
        <input type="number" placeholder=" ">

        <br><br>

        <label for="Gender">Gender:</label>
        <select>
            <option>male</option><option>female</option>
        </select>
         &nbsp;
        <label for="Email">Email Addrs:</label>
        <input type="email" placeholder=" enter email address">

        <br><br>

        <label for="positions">Positions avalable:</label>
        <input type="radio" name="position" value="junior developer">Junior developer
         &nbsp;
         <input type="radio" name="position" value="Mid Level developer">Mid Level developer
          &nbsp;
         <input type="radio" name="position" value="Senior devloper">Senior devloper
        
         <br><br>

         <label for="Programming">Programming Languages:</label>
         <input type="checkbox" name="java" value="java">java
          &nbsp;
         <input type="checkbox" name="javascript" value="js">javascript
          &nbsp;
         <input type="checkbox" name="python"  value="python">python

         <br><br>

         <label for="password">Password:</label>
         <input type="password" placeholder=" ">
           &nbsp;
         <label for="conf password">Confirm Password:</label>
         <input type="password" placeholder=" ">
          <br><br>
         <input type="button" value="Submit">
        <input type="button" value="reset">


    </form>
</body>
</html>
